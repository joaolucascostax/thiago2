name: Atualizar feed Meta (Thiago Veículos)

# Quando rodar:
#  - todo dia às 08:00 UTC (= 05:00 no horário de Brasília)
#  - e também manualmente, pelo botão "Run workflow" na aba Actions
on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

# O job precisa poder gravar de volta no repositório (commit do CSV atualizado)
permissions:
  contents: write

# Evita duas execuções ao mesmo tempo
concurrency:
  group: feed-meta
  cancel-in-progress: false

jobs:
  build-feed:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar o repositório
        uses: actions/checkout@v4

      - name: Preparar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Gerar o feed (rodar o scraper)
        run: python scraper.py

      - name: Adicionar coluna id (exigida pela Meta)
        run: |
          python - <<'PYEOF'
          import csv, os
          path = "docs/catalog_vehicles.csv"
          if not os.path.exists(path):
              print("CSV não encontrado, pulando.")
              exit(0)
          with open(path, encoding="utf-8", newline="") as f:
              rows = list(csv.DictReader(f))
          if not rows or "id" in rows[0]:
              print("Coluna id já existe ou CSV vazio, nada a fazer.")
              exit(0)
          fields = ["id"] + list(rows[0].keys())
          with open(path, "w", encoding="utf-8", newline="") as f:
              w = csv.DictWriter(f, fieldnames=fields)
              w.writeheader()
              for r in rows:
                  r["id"] = r.get("vehicle_id", "")
                  w.writerow(r)
          print(f"Coluna id adicionada. Total: {len(rows)} veículos.")
          PYEOF

      - name: Publicar o feed se algo mudou
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/catalog_vehicles.csv docs/feed_stats.json docs/index.html
          if git diff --staged --quiet; then
            echo "Nada mudou no estoque hoje. Nada pra publicar."
          else
            git commit -m "feed: atualização automática $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
            echo "Feed atualizado e publicado."
          fi
